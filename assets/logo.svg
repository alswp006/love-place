<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 마시멜로 앱 아이콘 소스 — 핑크크림 배경 + 겹친 2인 하트("둘" 모티프). @capacitor/assets로 전 사이즈 생성. -->
  <rect width="1024" height="1024" fill="#fff1f4"/>
  <g transform="translate(512 540)">
    <!-- 라벤더 하트(상대) — 살짝 뒤/좌 -->
    <path transform="translate(-150 0) scale(13)" fill="#c3aee0"
      d="M0 6 C0 1 -4 -3 -8 -3 C-12 -3 -15 0 -15 4 C-15 10 -8 15 0 21 C8 15 15 10 15 4 C15 0 12 -3 8 -3 C4 -3 0 1 0 6 Z"/>
    <!-- 핑크 하트(나) — 앞/우, 겹침 -->
    <path transform="translate(150 0) scale(13)" fill="#ff93ac"
      d="M0 6 C0 1 -4 -3 -8 -3 C-12 -3 -15 0 -15 4 C-15 10 -8 15 0 21 C8 15 15 10 15 4 C15 0 12 -3 8 -3 C4 -3 0 1 0 6 Z"/>
  </g>
</svg>
