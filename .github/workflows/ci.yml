name: CI

# 4게이트(설계서 §9.1 / CLAUDE.md §6): tsc 0 · vitest · build · Playwright 비주얼 스모크.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc 0 errors)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (vite production)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Playwright webServer는 위 build의 dist를 preview로 서빙(재빌드 없음).
      - name: Functional + visual smoke (Playwright)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
